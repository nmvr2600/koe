name: Build Release

on:
  push:
    branches: [main, my-main, feat/*]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-darwin
          toolchain: stable

      - name: Check Xcode version
        run: xcode-select -p && xcodebuild -version

      - name: Install dependencies
        run: |
          brew install xcodegen

      - name: Generate Xcode project
        run: make generate

      - name: Build Rust library
        run: make build-rust

      - name: Build macOS App
        run: make build-xcode

      - name: Package App
        run: |
          BUILD_DIR=$(find ~/Library/Developer/Xcode/DerivedData -name "Koe.app" -path "*/Release/*" 2>/dev/null | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "Error: Koe.app not found"
            exit 1
          fi
          echo "Found app at: $BUILD_DIR"
          mkdir -p release
          cp -R "$BUILD_DIR" release/
          # Extract version from Info.plist
          VERSION=$(plutil -extract CFBundleShortVersionString raw "${BUILD_DIR}/Contents/Info.plist")
          BUILD=$(plutil -extract CFBundleVersion raw "${BUILD_DIR}/Contents/Info.plist")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD=$BUILD" >> $GITHUB_ENV
          cd release
          zip -r "Koe-v${VERSION}-build${BUILD}.zip" Koe.app
          echo "PACKAGED_PATH=$(pwd)/Koe-v${VERSION}-build${BUILD}.zip" >> $GITHUB_ENV

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/heads/')
        with:
          tag_name: v${{ env.VERSION }}-build${{ env.BUILD }}-${{ github.ref_name }}
          name: Koe v${{ env.VERSION }} (Build ${{ env.BUILD }})
          body: |
            **Koe v${{ env.VERSION }} (Build ${{ env.BUILD }})**

            - 分支: `${{ github.ref_name }}`
            - 提交: `${{ github.sha }}`
            - 构建时间: ${{ github.event.head_commit.timestamp }}

            安装后首次启动需要在系统设置中授予麦克风、辅助功能和输入监控权限。
          draft: false
          prerelease: false
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
